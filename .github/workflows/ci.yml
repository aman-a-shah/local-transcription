name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Backend deps (faster-whisper etc.) are heavy; the lightweight tests
          # (polish + silence trim) only need these. The macOS-only end-to-end
          # transcription test is skipped automatically where `say` is absent.
          pip install pytest numpy scipy

      - name: Run tests
        run: python -m pytest -v
